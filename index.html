<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>EEO Data Intelligence | 2026-2027 IBP Grant Initiative</title>
 <meta name="description" content="Project management intelligence dashboard for the EEO Innovative Best Practices Grant Initiative — monitoring fund allocations, outcomes, and progress across 11 California Community College Districts." />
 <link rel="preconnect" href="https://fonts.googleapis.com" />
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
 <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
 <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
 <style>
 :root {
 --ccc-dark-blue: #002F6D;
 --ccc-darker-blue: #002755;
 --ccc-medium-blue: #0066BA;
 --ccc-light-blue: #40B4E5;
 --ccc-gold: #FFB600;
 --ccc-dark-gold: #D18A00;
 --ccc-light-gold: #F6DC6B;
 --ccc-dark-grey: #555759;
 --ccc-medium-grey: #717271;
 --ccc-light-grey: #B2B3B2;
 --bg: #F4F6FA;
 --bg-surface: #FFFFFF;
 --bg-card: #FFFFFF;
 --border: rgba(0, 47, 109, 0.12);
 --text-primary: #1A1F2E;
 --text-secondary: #555759;
 --text-muted: #717271;
 --accent: #002F6D;
 --card-shadow: 0 4px 20px -4px rgba(0, 47, 109, 0.08);
 }

 [data-theme="dark"] {
 --bg: #0D1117;
 --bg-surface: #161B22;
 --bg-card: #1C2128;
 --border: rgba(255, 255, 255, 0.1);
 --text-primary: #E6EDF3;
 --text-secondary: #8B949E;
 }

 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text-primary); height: 100vh; display: grid; grid-template-columns: 280px 1fr; overflow: hidden; }

 aside { background: var(--ccc-dark-blue); color: white; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; }
 .brand-header h1 { font-family: 'Crimson Text', serif; font-size: 1.4rem; margin-bottom: 0.2rem; }
 .brand-header p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.7; }
 
 nav { margin-top: 3rem; }
 .nav-item { display: block; padding: 0.8rem 1rem; border-radius: 8px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; margin-bottom: 0.25rem; }
 .nav-item.active { background: var(--ccc-medium-blue); color: white; }

 main { padding: 2.5rem 3.5rem; overflow-y: auto; }
 header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
 h2 { font-family: 'Crimson Text', serif; font-size: 1.8rem; color: var(--ccc-dark-blue); }

 .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2.5rem; }
 .kpi-card { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--card-shadow); }
 .kpi-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.5rem; }
 .kpi-value { font-size: 1.8rem; font-weight: 700; color: var(--ccc-dark-blue); }

 .card { background: var(--bg-card); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--card-shadow); margin-bottom: 2rem; }
 .card-title { font-size: 1.1rem; font-weight: 700; color: var(--ccc-dark-blue); margin-bottom: 1.5rem; }

 table { width: 100%; border-collapse: collapse; }
 th { text-align: left; padding: 1rem; font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); border-bottom: 2px solid var(--border); }
 td { padding: 1rem; font-size: 0.9rem; border-bottom: 1px solid var(--border); }
 .funding { font-weight: 700; color: var(--ccc-dark-blue); }
 </style>
</head>
<body>
 <aside>
 <div class="brand-header">
 <h1>EEO Data Intelligence</h1>
 <p>2026–2027 IBP Grant Initiative</p>
 </div>
 <nav>
 <a href="#" class="nav-item active">Program Overview</a>
 <a href="#" class="nav-item">Fund Allocations</a>
 <a href="#" class="nav-item">District Review</a>
 </nav>
 </aside>
 <main>
 <header>
 <h2>Program Overview</h2>
 <button onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">Toggle Theme</button>
 </header>
 <div class="kpi-grid">
 <div class="kpi-card"><div class="kpi-label">Total Grant</div><div class="kpi-value">$1.40M</div></div>
 <div class="kpi-card"><div class="kpi-label">Year 1 (2026)</div><div class="kpi-value">$0.70M</div></div>
 <div class="kpi-card"><div class="kpi-label">Year 2 (2027)</div><div class="kpi-value">$0.70M</div></div>
 <div class="kpi-card"><div class="kpi-label">Districts</div><div class="kpi-value">11</div></div>
 </div>
 <div class="card">
 <h3 class="card-title">District Funding Summary (Year 1 & Year 2 Only)</h3>
 <table>
 <thead><tr><th>District</th><th>Tier</th><th>Year 1</th><th>Year 2</th><th>Total Award</th></tr></thead>
 <tbody id="table-body"></tbody>
 </table>
 </div>
 </main>
 <script>
 const data = [
 { n: "Antelope Valley", t: 2, f: 100000 }, { n: "Allan Hancock", t: 1, f: 150000 },
 { n: "Kern", t: 1, f: 150000 }, { n: "North Orange", t: 1, f: 150000 },
 { n: "Santa Monica", t: 1, f: 150000 }, { n: "Mt. SAC", t: 1, f: 150000 },
 { n: "San Diego", t: 1, f: 150000 }, { n: "Citrus", t: 2, f: 100000 },
 { n: "Peralta", t: 2, f: 100000 }, { n: "West Valley-Mission", t: 2, f: 100000 },
 { n: "Southwestern", t: 1, f: 99997 }
 ];
 const tbody = document.getElementById('table-body');
 data.forEach(d => {
 const y1 = d.f / 2;
 tbody.innerHTML += `<tr><td>${d.n}</td><td>Tier ${d.t}</td><td class="funding">$${y1.toLocaleString()}</td><td class="funding">$${y1.toLocaleString()}</td><td class="funding">$${d.f.toLocaleString()}</td></tr>`;
 });
 </script>
</body>
</html>
